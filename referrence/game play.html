<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flappy Bird Gameplay Screen (Web Optimized)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;family=Spline+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#19e65e",
                    "background-light": "#f6f8f6",
                    "background-dark": "#112116",
                    "flappy-sky": "#70c5ce",
                    "flappy-pipe": "#54ac42",
                    "flappy-pipe-dark": "#367d2a",
                    "flappy-bird": "#f6e05e",
                    "flappy-bird-wing": "#ffdb21",
                    "flappy-bird-beak": "#f2994a",
                    "flappy-ground-light": "#ded895",
                    "flappy-ground-dark": "#b9a35a",
                    "flappy-outline": "#000000",
                },
                fontFamily: {
                    "display": ["Spline Sans", "Noto Sans", "sans-serif"],
                    "pixel": ["'Press Start 2P'", "cursive"]
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
            },
        },
    }
    </script>
<style>
    .pixelated {
        image-rendering: pixelated;
    }
    .text-outline {
        text-shadow:
            -2px -2px 0 #000,
             2px -2px 0 #000,
            -2px  2px 0 #000,
             2px  2px 0 #000;
    }
    .grass-pattern {
        background-color: #ded895;
        background-image:
            linear-gradient(rgba(185, 163, 90, 0.7) 1px, transparent 1px),
            linear-gradient(90deg, rgba(185, 163, 90, 0.7) 1px, transparent 1px);
        background-size: 8px 8px;
    }
    .grass-top {
        background: repeating-linear-gradient(90deg, #54ac42, #54ac42 8px, #367d2a 8px, #367d2a 16px);
    }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex h-screen w-full flex-col items-center justify-center group/design-root overflow-hidden bg-[#112116] p-4">
<div class="relative w-full max-w-4xl aspect-video bg-flappy-sky overflow-hidden border-4 border-flappy-outline shadow-2xl">
<div class="absolute inset-0 z-0">
<div class="absolute top-[10%] left-[15%] w-16 h-8 bg-white/80 pixelated"></div>
<div class="absolute top-[20%] left-[70%] w-24 h-12 bg-white/80 pixelated"></div>
<div class="absolute top-[15%] left-[40%] w-20 h-10 bg-white/80 pixelated"></div>
<div class="absolute top-[25%] left-[5%] w-20 h-10 bg-white/80 pixelated"></div>
<div class="absolute top-[8%] left-[85%] w-16 h-8 bg-white/80 pixelated"></div>
<div class="absolute bottom-[20%] left-0 w-full h-1/4">
<div class="absolute bottom-0 left-[5%] w-16 h-full bg-[#d0d0d0] pixelated"></div>
<div class="absolute bottom-0 left-[10%] w-8 h-1/2 bg-[#a0a0a0] pixelated"></div>
<div class="absolute bottom-0 left-[20%] w-12 h-1/3 bg-[#b0b0b0] pixelated"></div>
<div class="absolute bottom-0 left-[30%] w-20 h-3/4 bg-[#c0c0c0] pixelated"></div>
<div class="absolute bottom-0 left-[45%] w-10 h-1/2 bg-[#a0a0a0] pixelated"></div>
<div class="absolute bottom-0 left-[60%] w-12 h-full bg-[#b0b0b0] pixelated"></div>
<div class="absolute bottom-0 left-[75%] w-16 h-2/3 bg-[#a0a0a0] pixelated"></div>
<div class="absolute bottom-0 left-[90%] w-14 h-1/2 bg-[#c0c0c0] pixelated"></div>
</div>
</div>
<div class="relative z-10 w-full h-full">
<div class="absolute top-0 bottom-0 left-[70%] w-20 flex flex-col justify-between">
<div class="flex flex-col items-center">
<div class="w-full h-48 bg-flappy-pipe border-2 border-flappy-outline pixelated"></div>
<div class="w-[88px] h-8 bg-flappy-pipe border-2 border-flappy-outline -mt-1 pixelated"></div>
</div>
<div class="flex flex-col items-center">
<div class="w-[88px] h-8 bg-flappy-pipe border-2 border-flappy-outline -mb-1 pixelated"></div>
<div class="w-full h-48 bg-flappy-pipe border-2 border-flappy-outline pixelated"></div>
</div>
</div>
<div class="absolute top-1/2 left-[20%] -translate-y-1/2 w-12 h-9 pixelated">
<div class="absolute w-10 h-8 top-1 left-0 bg-flappy-bird border-2 border-flappy-outline rounded-full"></div>
<div class="absolute top-3 right-1 w-3 h-3 bg-white border border-flappy-outline rounded-full flex items-center justify-center">
<div class="w-1.5 h-1.5 bg-black rounded-full"></div>
</div>
<div class="absolute top-[18px] left-[26px] w-5 h-3 bg-flappy-bird-beak border-2 border-flappy-outline rounded-r-sm"></div>
<div class="absolute top-5 left-1 w-6 h-4 bg-flappy-bird-wing border-2 border-flappy-outline rounded-t-full rounded-b-sm rotate-[-20deg]"></div>
</div>
<div class="absolute top-8 left-1/2 -translate-x-1/2">
<h1 class="text-white tracking-light text-6xl font-bold font-pixel text-outline">0</h1>
</div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="text-center p-4">
<p class="text-white text-xl font-normal leading-normal font-pixel text-outline">Click or Press Space to Start</p>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full h-[20%] z-20">
<div class="h-4 w-full grass-top border-t-4 border-b-2 border-flappy-outline"></div>
<div class="w-full h-[calc(100%-16px)] grass-pattern border-t-2 border-flappy-outline"></div>
</div>
</div>
</div>

</body></html>
