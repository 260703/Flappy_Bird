<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Flappy Remastered - Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#259df4",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101a22",
                        "game-green": "#4ade80",
                        "game-orange": "#fb923c",
                        "game-red": "#f87171",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>.glass-panel {
    background: rgba(16, 26, 34, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1)
    }
.bg-game-scene {
    background-image: linear-gradient(to bottom, rgba(16, 26, 34, 0.4), rgba(16, 26, 34, 0.9)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuDBZupdHzASKpPzHAOp-vW9T6sUWSYgwI4OA7juYG6glMS5N-OO8E5rBYl8qWp_c8UaRla5e1gD7k_aqNixqem0j-L-9lBBG6roL_TwOzx3sgU94yA3G4c8P0Qv7mEUwTg5xnA-7WaQLWqxqT52_hSmVBSHIBUKsvmVQk4jl0Q4Rj1CukwfzjDjNL2OjlbQuDK_jq_1JyJUVANaTol1G6hB_irTJKLO1Bhb30UY3YuEAvOfH69ndY8Pr0-GTHeBlw0cfLGN8qN7d4Ym);
    background-size: cover;
    background-position: center
    }</style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Background Layer -->
<div class="fixed inset-0 bg-game-scene z-0" data-alt="Blurred vibrant abstract game background with blue and green tones"></div>
<div class="relative z-10 flex min-h-screen items-center justify-center p-4 md:p-8">
<div class="layout-container flex h-full grow flex-col max-w-[560px] w-full">
<!-- Main Profile Card -->
<div class="glass-panel rounded-xl shadow-2xl overflow-hidden flex flex-col">
<!-- Header with Back Button -->
<header class="flex items-center justify-between px-8 py-6 border-b border-white/10">
<button class="flex items-center justify-center size-10 rounded-full bg-white/10 hover:bg-white/20 transition-colors text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-white text-xl font-extrabold tracking-tight">Edit Profile</h2>
<div class="size-10"></div> <!-- Spacer for symmetry -->
</header>
<div class="px-8 py-8 flex flex-col gap-8">
<!-- Avatar Section -->
<div class="flex flex-col items-center gap-6">
<div class="relative group">
<div class="size-32 rounded-full p-1 bg-gradient-to-tr from-game-green via-primary to-game-orange animate-pulse shadow-[0_0_20px_rgba(37,157,244,0.4)]">
<div class="size-full rounded-full overflow-hidden bg-background-dark border-4 border-background-dark">
<img alt="Stylized character avatar" class="w-full h-full object-cover" data-alt="Digital illustration of a premium stylized bird character" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAbxQoxgIBnNiyjzG9x5oMYjbLyWJzRdx19GveIyYPrRdMWuVJZwDiYoEPa9ID2lECSg_TaPVyX_oqsSfR1FPSlirskYHhQsxMxBBHWXovbeblX_qDssSTHZv5x_6Ll_bKjw2NzBKJaEjFIQxxgzGDPv2YvKU4wn9xjsqPO6YQ8X1miO0sp7wLkEIfu3zlnSyPYCIEc0BszqSQHJzhUXOpgjEyKyYyJpxbW7IRH6loogrDOhiPxtDYPrPsXaBVqOZNYkTU-wVYn0OSf"/>
</div>
</div>
<button class="absolute bottom-0 right-0 size-10 bg-primary rounded-full flex items-center justify-center border-4 border-background-dark text-white hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<!-- Upload Avatar UI -->
<div class="w-full flex flex-col items-center gap-2">
<p class="text-white/60 text-sm font-medium">Update your look</p>
<label class="w-full cursor-pointer group">
<div class="flex flex-col items-center justify-center border-2 border-dashed border-white/20 rounded-xl py-4 group-hover:border-primary/50 transition-colors bg-white/5">
<span class="material-symbols-outlined text-white/40 mb-1">cloud_upload</span>
<span class="text-white/80 text-sm font-bold">Choose new bird skin</span>
<input class="hidden" type="file"/>
</div>
</label>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-white/70 text-sm font-bold px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-xs">person</span> Username
                            </label>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl px-4 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-white/20" placeholder="Enter username" type="text" value="FlappyMaster_99"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-white/70 text-sm font-bold px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-xs">badge</span> Full Name
                            </label>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl px-4 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-white/20" placeholder="Enter full name" type="text" value="Alex Rivera"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-white/70 text-sm font-bold px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-xs">calendar_today</span> Age
                            </label>
<input class="w-full h-14 bg-white/5 border border-white/10 rounded-xl px-4 text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-white/20" placeholder="Enter age" type="number" value="24"/>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 pt-4">
<button class="flex-1 h-14 bg-game-orange text-white font-extrabold text-lg rounded-xl shadow-[0_4px_0_#c2410c] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">close</span>
                            Discard
                        </button>
<button class="flex-1 h-14 bg-game-green text-white font-extrabold text-lg rounded-xl shadow-[0_4px_0_#15803d] active:shadow-none active:translate-y-1 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check</span>
                            Save Changes
                        </button>
</div>
<!-- Footer Options -->
<div class="flex flex-col items-center gap-6 mt-4">
<div class="h-px w-full bg-white/10"></div>
<button class="flex items-center gap-2 text-game-red font-bold hover:scale-105 transition-transform group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">logout</span>
                            Logout from Session
                        </button>
<p class="text-white/30 text-[10px] uppercase tracking-widest font-bold">Flappy Remastered v2.0.4</p>
</div>
</div>
</div>
<!-- Floating Decoration -->
<div class="mt-8 flex justify-center gap-4 opacity-50">
<div class="size-2 rounded-full bg-primary"></div>
<div class="size-2 rounded-full bg-game-green"></div>
<div class="size-2 rounded-full bg-game-orange"></div>
</div>
</div>
</div>
</body></html>
